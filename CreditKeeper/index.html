  <body>
    <script>
      (function () {
        var BUILD = 'd5951f5-1780603831';
        var KEY = 'ck_deploy_build';
        try {
          if (localStorage.getItem(KEY) !== BUILD) {
            var keys = [];
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (
                k &&
                (k.indexOf('ck_portfolio') === 0 ||
                  k.indexOf('ck_auto_demo') === 0 ||
                  k === 'ck_wallet_welcomed' ||
                  k === 'ck_onboarding_complete')
              ) {
                keys.push(k);
              }
            }
            keys.forEach(function (k) {
              localStorage.removeItem(k);
            });
            [
              'ck_portfolio_variant',
              'ck_portfolio_session',
              'ck_auto_demo_wallet',
              'ck_portfolio_welcome_dismissed',
              'ck_portfolio_force_welcome',
            ].forEach(function (k) {
              sessionStorage.removeItem(k);
            });
            localStorage.setItem(KEY, BUILD);
            location.reload();
            return;
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <script>
      (function () {
        var r = sessionStorage.getItem('ck-spa-redirect');
        if (r) {
          sessionStorage.removeItem('ck-spa-redirect');
          history.replaceState(null, '', r);
        }
      })();
    </script>
    <div id="root"></div>
