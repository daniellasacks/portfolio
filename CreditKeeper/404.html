<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CreditKeeper</title>
    <script>
      sessionStorage.setItem(
        'ck-spa-redirect',
        location.pathname + location.search + location.hash
      );
      var path = location.pathname;
      var marker = '/portfolio/CreditKeeper';
      var i = path.indexOf(marker);
      if (i >= 0) {
        location.replace(path.slice(0, i + marker.length + 1) + location.search + location.hash);
      } else {
        var legacy = '/CreditKeeper';
        var j = path.indexOf(legacy);
        if (j >= 0) {
          location.replace(path.slice(0, j + legacy.length + 1) + location.search + location.hash);
        } else {
          location.replace('./');
        }
      }
    </script>
  </head>
  <body></body>
</html>
